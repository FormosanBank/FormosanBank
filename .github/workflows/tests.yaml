name: tests

on:
  pull_request:
    paths:
      - 'QC/**'
      - 'tests/**'
      - 'Corpora/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/tests.yaml'
  push:
    branches: [main]
    paths:
      - 'QC/**'
      - 'tests/**'
      - 'Corpora/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/tests.yaml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30
