name: Corpus Metrics

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Corpora/**"
      - "QC/corpus_metrics.py"
      - "QC/reference/corpus_benchmarks.json"
      - ".github/workflows/corpus-metrics.yaml"
  pull_request:
    paths:
      - "Corpora/**"
      - "QC/corpus_metrics.py"
      - "QC/reference/corpus_benchmarks.json"
      - ".github/workflows/corpus-metrics.yaml"

jobs:
  corpus-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install plotting dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install matplotlib

      - name: Generate corpus metrics
        run: |
          python3 QC/corpus_metrics.py Corpora \
            --output-dir corpus-metrics \
            --history \
            --max-history-commits 12

      - name: Add metrics summary
        run: cat corpus-metrics/corpus_metrics.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload corpus metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corpus-metrics
          path: corpus-metrics/
